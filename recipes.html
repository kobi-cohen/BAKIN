<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מתכונים | LUNA לונה</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="category.css"/>
  <link rel="stylesheet" href="recipes-page.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div id="page-header"></div>

  <!-- HERO -->
  <div class="cat-hero" style="background-image:url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1400&q=80')">
    <div class="cat-hero-overlay"></div>
    <div class="cat-hero-content">
      <div class="container">
        <nav class="breadcrumb">
          <a href="index.html">ראשי</a>
          <span class="sep"><i class="fa fa-chevron-left" style="font-size:10px"></i></span>
          <span class="current">מתכונים</span>
        </nav>
        <h1>מתכונים לאפייה</h1>
        <p>מאות מתכונים בחינם לכל הרמות</p>
      </div>
    </div>
  </div>

  <!-- FILTER PILLS -->
  <div class="container" style="padding-top:30px">
    <div class="subcat-pills" id="recipe-pills">
      <button class="pill active" onclick="filterRecipes('הכל',this)">הכל</button>
      <button class="pill" onclick="filterRecipes('עוגות',this)">עוגות</button>
      <button class="pill" onclick="filterRecipes('קאפקייקס',this)">קאפקייקס</button>
      <button class="pill" onclick="filterRecipes('עוגיות',this)">עוגיות</button>
      <button class="pill" onclick="filterRecipes('מקרונס',this)">מקרונס</button>
      <button class="pill" onclick="filterRecipes('קלה',this)">קלות להכנה</button>
      <button class="pill" onclick="filterRecipes('מתקדם',this)">מתקדמות</button>
    </div>
  </div>

  <!-- RECIPES GRID -->
  <div class="container recipes-full-grid" id="recipes-grid"></div>

  <div id="page-footer"></div>

  <script src="/site-config.js"></script>
  <script src="/products-data.js"></script>
  <script src="components.js"></script>
  <script src="recipes-data.js"></script>
  <script>

    let currentFilter = 'הכל';

    function filterRecipes(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('#recipe-pills .pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderRecipes();
    }

    function renderRecipes() {
      const filtered = currentFilter === 'הכל'
        ? RECIPES_DATA
        : RECIPES_DATA.filter(r => r.tags.includes(currentFilter) || r.cat === currentFilter || r.level === currentFilter);
      const grid = document.getElementById('recipes-grid');
      grid.innerHTML = filtered.map((r,i) => `
        <article class="recipe-full-card" style="animation-delay:${i*0.07}s">
          <div class="rfcard-img">
            <img src="${r.image}" alt="${r.title}" loading="lazy"/>
            <div class="rfcard-tags">
              ${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
          <div class="rfcard-body">
            <h3>${r.title}</h3>
            <p>${r.desc}</p>
            <div class="rfcard-meta">
              <span><i class="fa fa-clock"></i> ${r.time}</span>
              <span><i class="fa fa-signal"></i> ${r.level}</span>
              <span><i class="fa fa-users"></i> ${r.servings} מנות</span>
            </div>
            <div class="rfcard-preview">
              <strong>רכיבים עיקריים:</strong>
              <ul>${r.ingredients.slice(0,4).map(ing=>`<li>${ing}</li>`).join('')}${r.ingredients.length>4?`<li>ועוד ${r.ingredients.length-4} רכיבים...</li>`:''}</ul>
            </div>
            <a href="recipe.html?id=${r.id}" class="btn btn-primary btn-sm">למתכון המלא</a>
          </div>
        </article>`).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderHeader('recipes');
      renderRecipes();
    });
  </script>
  <style>
    .recipes-full-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 30px 20px 70px;
    }
    .recipe-full-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: var(--transition);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .recipe-full-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .rfcard-img { position: relative; height: 220px; }
    .rfcard-img img { width: 100%; height: 100%; object-fit: cover; }
    .rfcard-tags { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .rfcard-body { padding: 20px; }
    .rfcard-body h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .rfcard-body p { font-size: 14px; color: var(--text-light); margin-bottom: 14px; line-height: 1.6; }
    .rfcard-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-light); margin-bottom: 16px; flex-wrap: wrap; }
    .rfcard-meta i { color: var(--primary); margin-left: 4px; }
    .rfcard-preview { background: var(--bg-light); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 16px; }
    .rfcard-preview strong { font-size: 13px; display: block; margin-bottom: 8px; }
    .rfcard-preview ul { padding-right: 18px; }
    .rfcard-preview li { font-size: 13px; color: var(--text-light); margin-bottom: 4px; list-style: disc; }
    @media(max-width:600px) { .recipes-full-grid { grid-template-columns: 1fr; } }
  </style>
</body>
</html>
