<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מתכונים | LUNA לונה</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="category.css"/>
  <link rel="stylesheet" href="recipes-page.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div id="page-header"></div>

  <!-- HERO -->
  <div class="cat-hero" style="background-image:url('https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1400&q=80')">
    <div class="cat-hero-overlay"></div>
    <div class="cat-hero-content">
      <div class="container">
        <nav class="breadcrumb">
          <a href="index.html">ראשי</a>
          <span class="sep"><i class="fa fa-chevron-left" style="font-size:10px"></i></span>
          <span class="current">מתכונים</span>
        </nav>
        <h1>מתכונים לאפייה</h1>
        <p>מאות מתכונים בחינם לכל הרמות</p>
      </div>
    </div>
  </div>

  <!-- FILTER PILLS -->
  <div class="container" style="padding-top:30px">
    <div class="subcat-pills" id="recipe-pills">
      <button class="pill active" onclick="filterRecipes('הכל',this)">הכל</button>
      <button class="pill" onclick="filterRecipes('עוגות',this)">עוגות</button>
      <button class="pill" onclick="filterRecipes('קאפקייקס',this)">קאפקייקס</button>
      <button class="pill" onclick="filterRecipes('עוגיות',this)">עוגיות</button>
      <button class="pill" onclick="filterRecipes('מקרונס',this)">מקרונס</button>
      <button class="pill" onclick="filterRecipes('קלה',this)">קלות להכנה</button>
      <button class="pill" onclick="filterRecipes('מתקדם',this)">מתקדמות</button>
    </div>
  </div>

  <!-- RECIPES GRID -->
  <div class="container recipes-full-grid" id="recipes-grid"></div>

  <div id="page-footer"></div>

  <script src="/site-config.js"></script>
  <script src="/products-data.js"></script>
  <script src="components.js"></script>
  <script>
    const RECIPES_DATA = [
      { id:'chocolate-cake', title:'עוגת שוקולד מושלמת ולחה', cat:'עוגות', level:'קלה', time:'45 דקות', servings:12, tags:['עוגות','שוקולד'],
        image:'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=700&q=80',
        desc:'עוגת השוקולד הכי טובה שתכינו - רכה, לחה ועם טעם שוקולד עמוק ומדהים.',
        ingredients:['2 כוסות קמח','1 כוס קקאו','2 כוסות סוכר','2 ביצים','1 כוס חלב','½ כוס שמן','1 כפית וניל','1 כפית אבקת אפייה'],
        steps:['חממו תנור ל-180°C','ערבבו חומרים יבשים','הוסיפו חומרים רטובים','אפו 35-40 דקות']
      },
      { id:'vanilla-cupcakes', title:'קאפקייקס וניל עם קרם חמאה', cat:'קאפקייקס', level:'קלה', time:'30 דקות', servings:12, tags:['קאפקייקס','וניל'],
        image:'https://images.unsplash.com/photo-1547592180-85f173990554?w=600&q=80',
        desc:'קאפקייקס וניל רכים ואוויריים עם קרם חמאה אמריקאי קלאסי.',
        ingredients:['1.5 כוס קמח','1 כוס סוכר','2 ביצים','½ כוס חמאה','½ כוס חלב','1 כפית וניל','לקרם: 200 גרם חמאה + 3 כוסות אבקת סוכר'],
        steps:['הכינו בלילה','אפו 18-20 דקות','קררו לחלוטין','זלפו קרם חמאה']
      },
      { id:'french-macarons', title:'מקרונס צרפתיים קלאסיים', cat:'מקרונס', level:'מתקדם', time:'2 שעות', servings:30, tags:['מקרונס','מתקדם'],
        image:'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=600&q=80',
        desc:'מקרונס צרפתיים אמיתיים עם פריכות מבחוץ ורכות בפנים.',
        ingredients:['140 גרם אבקת שקדים','140 גרם אבקת סוכר','2 חלבונים (52 גרם)','150 גרם סוכר','50 מ"ל מים','ממרח גנאש למילוי'],
        steps:['נפו שקדים עם אבקת סוכר','הכינו מרנג איטלקי','קפלו מקרונז\'','זלפו וייבשו 30 דקות','אפו 150°C 12 דקות']
      },
      { id:'choco-chip-cookies', title:'עוגיות שוקולד צ\'יפס קריספיות', cat:'עוגיות', level:'קלה', time:'25 דקות', servings:24, tags:['עוגיות','שוקולד'],
        image:'https://images.unsplash.com/photo-1519869325930-281384150729?w=600&q=80',
        desc:'עוגיות קריספיות מבחוץ ורכות מבפנים עם שפע שוקולד צ\'יפס.',
        ingredients:['2 כוסות קמח','¾ כוס סוכר לבן','¾ כוס סוכר חום','200 גרם חמאה','2 ביצים','1 כפית וניל','200 גרם שוקולד צ\'יפס','1 כפית סודה לשתייה'],
        steps:['המיסו חמאה וקררו','ערבבו עם סוכרים וביצים','הוסיפו קמח ושוקולד','גלגלו לכדורים','אפו 180°C 10-12 דקות']
      },
      { id:'lemon-tart', title:'טארט לימון צרפתי', cat:'עוגות', level:'בינוני', time:'90 דקות', servings:8, tags:['עוגות','לימון'],
        image:'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=600&q=80',
        desc:'קינוח קלאסי בעל קרם לימון עשיר וחמצמץ בתוך בצק פריך מתוק.',
        ingredients:['לבצק: 200 גרם קמח, 100 גרם חמאה, 50 גרם אבקת סוכר','לקרם: 3 ביצים, 150 מ"ל מיץ לימון, 150 גרם סוכר, 100 גרם חמאה'],
        steps:['הכינו בצק פריך','אפו עיוור 15 דקות','הכינו קרם לימון','מלאו ואפו 10 דקות נוספות']
      },
      { id:'cinnamon-rolls', title:'רולים עם קינמון וציפוי גבינה', cat:'מאפים', level:'בינוני', time:'120 דקות', servings:12, tags:['מאפים','קינמון'],
        image:'https://images.unsplash.com/photo-1509365465985-25d11c17e812?w=600&q=80',
        desc:'רולי קינמון רכים וגמישים עם ציפוי גבינת שמנת מתוקה.',
        ingredients:['3 כוסות קמח','7 גרם שמרים','1 כוס חלב חמים','50 גרם חמאה','לציפוי: קינמון + סוכר חום','לציפוי גבינה: 200 גרם גבינה + 1.5 כוס אבקת סוכר'],
        steps:['הכינו בצק שמרים','תפיחה ראשונה שעה','רידוד ומילוי קינמון','גלגול וחיתוך','תפיחה שנייה 30 דקות','אפו 180°C 20 דקות']
      }
    ];

    let currentFilter = 'הכל';

    function filterRecipes(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('#recipe-pills .pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderRecipes();
    }

    function renderRecipes() {
      const filtered = currentFilter === 'הכל'
        ? RECIPES_DATA
        : RECIPES_DATA.filter(r => r.tags.includes(currentFilter) || r.cat === currentFilter || r.level === currentFilter);
      const grid = document.getElementById('recipes-grid');
      grid.innerHTML = filtered.map((r,i) => `
        <article class="recipe-full-card" style="animation-delay:${i*0.07}s">
          <div class="rfcard-img">
            <img src="${r.image}" alt="${r.title}" loading="lazy"/>
            <div class="rfcard-tags">
              ${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
          <div class="rfcard-body">
            <h3>${r.title}</h3>
            <p>${r.desc}</p>
            <div class="rfcard-meta">
              <span><i class="fa fa-clock"></i> ${r.time}</span>
              <span><i class="fa fa-signal"></i> ${r.level}</span>
              <span><i class="fa fa-users"></i> ${r.servings} מנות</span>
            </div>
            <div class="rfcard-preview">
              <strong>רכיבים עיקריים:</strong>
              <ul>${r.ingredients.slice(0,4).map(ing=>`<li>${ing}</li>`).join('')}${r.ingredients.length>4?`<li>ועוד ${r.ingredients.length-4} רכיבים...</li>`:''}</ul>
            </div>
            <a href="#" class="btn btn-primary btn-sm" onclick="event.preventDefault()">למתכון המלא</a>
          </div>
        </article>`).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderHeader('recipes');
      renderRecipes();
    });
  </script>
  <style>
    .recipes-full-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 30px 20px 70px;
    }
    .recipe-full-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: var(--transition);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .recipe-full-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .rfcard-img { position: relative; height: 220px; }
    .rfcard-img img { width: 100%; height: 100%; object-fit: cover; }
    .rfcard-tags { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .rfcard-body { padding: 20px; }
    .rfcard-body h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .rfcard-body p { font-size: 14px; color: var(--text-light); margin-bottom: 14px; line-height: 1.6; }
    .rfcard-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-light); margin-bottom: 16px; flex-wrap: wrap; }
    .rfcard-meta i { color: var(--primary); margin-left: 4px; }
    .rfcard-preview { background: var(--bg-light); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 16px; }
    .rfcard-preview strong { font-size: 13px; display: block; margin-bottom: 8px; }
    .rfcard-preview ul { padding-right: 18px; }
    .rfcard-preview li { font-size: 13px; color: var(--text-light); margin-bottom: 4px; list-style: disc; }
    @media(max-width:600px) { .recipes-full-grid { grid-template-columns: 1fr; } }
  </style>
</body>
</html>
